name: Deploy to Railway

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
    secrets:
      RAILWAY_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install railway cli
        run: npm install -g @railway/cli

      - name: deploy to railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ inputs.service }} --detach
